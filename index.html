<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Tracker</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #171a21;
    --border: #262b35;
    --text: #e7e9ee;
    --muted: #8b93a3;
    --accent: #4fd1a5;
    --accent-dim: #1f5c48;
    --danger: #e5697b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 80px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 28px; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-row input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 15px;
  }
  .add-row input:focus { outline: 2px solid var(--accent); }
  .add-row button {
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #04231a;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
  }
  .add-row button:hover { opacity: 0.9; }

  .habit {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .habit-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .habit-name { font-size: 16px; font-weight: 600; }
  .habit-meta { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .habit-actions { display: flex; gap: 8px; align-items: center; }

  .check-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .check-btn.done {
    background: var(--accent);
    color: #04231a;
  }
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 4px 8px;
  }
  .del-btn:hover { color: var(--danger); }

  .grid {
    display: grid;
    grid-template-columns: repeat(30, 1fr);
    gap: 3px;
  }
  .day {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--border);
  }
  .day.filled { background: var(--accent); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 14px;
  }

  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 32px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Streak Tracker</h1>
  <p class="sub">Tap the circle each day you keep a habit going. Data lives in this browser only.</p>

  <div class="add-row">
    <input id="newHabit" type="text" placeholder="Add a habit, e.g. Read 10 pages" maxlength="60">
    <button id="addBtn">Add</button>
  </div>

  <div id="list"></div>
  <p class="footer-note">Built and shipped with GitHub Desktop</p>
</div>

<script>
  const STORAGE_KEY = "streak-tracker-habits-v1";

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function daysAgoStr(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function save(habits) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
  }

  function computeStreak(dates) {
    let streak = 0;
    let cursor = new Date();
    const set = new Set(dates);
    if (!set.has(todayStr())) {
      cursor.setDate(cursor.getDate() - 1);
    }
    while (set.has(cursor.toISOString().slice(0, 10))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  let habits = load();

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    if (habits.length === 0) {
      list.innerHTML = '<div class="empty">No habits yet — add one above to start your streak.</div>';
      return;
    }

    habits.forEach((habit, idx) => {
      const doneToday = habit.dates.includes(todayStr());
      const streak = computeStreak(habit.dates);

      const card = document.createElement("div");
      card.className = "habit";

      const top = document.createElement("div");
      top.className = "habit-top";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="habit-name">${habit.name}</div>
        <div class="habit-meta">${streak} day${streak === 1 ? "" : "s"} streak</div>
      `;

      const actions = document.createElement("div");
      actions.className = "habit-actions";

      const checkBtn = document.createElement("button");
      checkBtn.className = "check-btn" + (doneToday ? " done" : "");
      checkBtn.textContent = doneToday ? "✓" : "";
      checkBtn.onclick = () => {
        const t = todayStr();
        const i = habit.dates.indexOf(t);
        if (i === -1) habit.dates.push(t);
        else habit.dates.splice(i, 1);
        save(habits);
        render();
      };

      const delBtn = document.createElement("button");
      delBtn.className = "del-btn";
      delBtn.textContent = "remove";
      delBtn.onclick = () => {
        habits.splice(idx, 1);
        save(habits);
        render();
      };

      actions.appendChild(checkBtn);
      actions.appendChild(delBtn);
      top.appendChild(left);
      top.appendChild(actions);

      const grid = document.createElement("div");
      grid.className = "grid";
      for (let i = 29; i >= 0; i--) {
        const dayEl = document.createElement("div");
        dayEl.className = "day" + (habit.dates.includes(daysAgoStr(i)) ? " filled" : "");
        dayEl.title = daysAgoStr(i);
        grid.appendChild(dayEl);
      }

      card.appendChild(top);
      card.appendChild(grid);
      list.appendChild(card);
    });
  }

  document.getElementById("addBtn").onclick = () => {
    const input = document.getElementById("newHabit");
    const name = input.value.trim();
    if (!name) return;
    habits.push({ name, dates: [] });
    save(habits);
    input.value = "";
    render();
  };

  document.getElementById("newHabit").addEventListener("keydown", (e) => {
    if (e.key === "Enter") document.getElementById("addBtn").click();
  });

  render();
</script>
</body>
</html>
